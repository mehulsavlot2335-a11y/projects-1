<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Password Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Password Generator</h1>
      <p class="subtitle">Create strong passwords and save them locally</p>
    </header>

    <section class="card">
      <h2>Generate Password</h2>

      <div id="error-message" class="error-message hidden" role="alert"></div>

      <div class="form-group">
        <label for="password-length">Password length (4–50)</label>
        <input type="number" id="password-length" min="4" max="50" value="04">
      </div>

      <fieldset class="options">
        <legend>Character types</legend>
        <label class="checkbox-label">
          <input type="checkbox" id="uppercase" checked>
          Uppercase (A-Z)
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="lowercase" checked>
          Lowercase (a-z)
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="numbers" checked>
          Numbers (0–9)
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="special" checked>
          Special (!@#$%^&*)
        </label>
      </fieldset>

      <div class="password-output">
        <input type="text" id="generated-password" readonly placeholder="Your password will appear here">
        <span id="strength-badge" class="strength-badge hidden">Weak</span>
      </div>

      <div class="button-row">
        <button type="button" id="generate-btn" class="btn btn-primary">Generate</button>
        <button type="button" id="copy-btn" class="btn btn-secondary" disabled>Copy</button>
      </div>

      <div class="save-section">
        <label for="password-label">Label (optional)</label>
        <input type="text" id="password-label" placeholder="e.g. Gmail, Work WiFi">
        <button type="button" id="save-btn" class="btn btn-save" disabled>Save Password</button>
      </div>
    </section>

    <section class="card">
      <h2>Saved Passwords</h2>

      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search by label or password...">
      </div>

      <p id="empty-state" class="empty-state">No saved passwords yet.</p>
      <ul id="password-list" class="password-list"></ul>
    </section>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
