<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h2>Rock Paper Scissors</h2>
        
        <!-- Scoreboard -->
        <div class="scoreboard">
            <div class="score-box user-score">
                <span class="label">You</span>
                <span class="score" id="user-score">0</span>
            </div>
            <div class="score-box comp-score">
                <span class="label">Computer</span>
                <span class="score" id="comp-score">0</span>
            </div>
        </div>

        <!-- Result Message -->
        <div class="result-message" id="result-message">
            Make your move to start!
        </div>

        <!-- Current Matchup Display -->
        <div class="matchup-display">
            <div class="choice-display" id="user-display">❓</div>
            <span class="vs-text">VS</span>
            <div class="choice-display" id="comp-display">❓</div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="choice-btn" onclick="playGame('rock')">🪨<br>Rock</button>
            <button class="choice-btn" onclick="playGame('paper')">📄<br>Paper</button>
            <button class="choice-btn" onclick="playGame('scissors')">✂️<br>Scissors</button>
        </div>

        <!-- Restart Button -->
        <button class="restart-btn" onclick="resetGame()">Restart Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
