<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stopwatch</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Stopwatch</h1>
      <p class="subtitle">Track time with laps</p>
    </header>

    <section class="card">
      <div class="display" id="time-display" aria-live="polite">
        <span id="hours">00</span>
        <span class="colon">:</span>
        <span id="minutes">00</span>
        <span class="colon">:</span>
        <span id="seconds">00</span>
        <span class="colon">:</span>
        <span id="centiseconds" class="centiseconds">00</span>
      </div>

      <div class="button-row">
        <button type="button" id="start-btn" class="btn btn-start">Start</button>
        <button type="button" id="resume-btn" class="btn btn-resume" disabled>Resume</button>
        <button type="button" id="pause-btn" class="btn btn-pause" disabled>Pause</button>
        <button type="button" id="reset-btn" class="btn btn-reset" disabled>Reset</button>
      </div>

      <div class="button-row lap-row">
        <button type="button" id="lap-btn" class="btn btn-lap" disabled>Lap</button>
      </div>
    </section>

    <section class="card">
      <h2>Lap Times</h2>
      <p id="empty-laps" class="empty-state">No laps recorded yet.</p>
      <ul id="lap-list" class="lap-list"></ul>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
